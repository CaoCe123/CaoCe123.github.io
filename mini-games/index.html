<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>小游戏合集</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/game-2048.css">
</head>
<body>
  <!-- 大厅视图 -->
  <section id="lobby-view">
    <h1 class="app-title">🎮 小游戏合集</h1>
    <p class="app-subtitle">选一个游戏开始玩吧</p>
    <div id="game-grid" class="game-grid"></div>
  </section>

  <!-- 游戏视图：进入游戏时显示，容器由各游戏模块填充 -->
  <section id="game-view" class="hidden">
    <div class="game-topbar">
      <button id="back-to-lobby" class="btn-glass">← 返回大厅</button>
      <div class="score-box">
        <span class="score-label">分数</span>
        <span id="current-score">0</span>
      </div>
      <div class="score-box">
        <span class="score-label">最高</span>
        <span id="high-score">0</span>
      </div>
    </div>
    <div id="game-mount"></div>
  </section>

  <!-- 加载顺序：依赖在前，app.js 最后 -->
  <script src="js/storage.js"></script>
  <script src="js/logic-2048.js"></script>
  <script src="js/games/game-2048.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
